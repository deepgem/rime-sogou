name: Update Sogou Hotwords

on:
  schedule:
    - cron: '0 22 * * *'  # 北京时间 06:00
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write

# 全局环境变量，用于解决 Node.js 20 警告并传递日期
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Download Latest ImewlConverter
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p tool
        echo "🔍 Fetching latest release from studyzy/imewlconverter..."
        gh release download --repo studyzy/imewlconverter -p "*linux-x64.tar.gz" -D tool
        echo "📦 Extracting..."
        tar -xvf tool/*linux-x64.tar.gz -C tool
        echo "📂 File list:"
        ls -R tool

    - name: Download Sogou Scel
      run: |
        wget -O sogou.scel "https://pinyin.sogou.com/d/dict/download_cell.php?id=4&name=网络流行新词"

    - name: Convert to Rime
      run: |
        mkdir -p output
        echo "🔍 Locating ImeWlConverterCmd..."
        
        EXE_PATH=$(find tool -type f -iname "ImeWlConverterCmd" | head -n 1)
        
        if [ -z "$EXE_PATH" ]; then
            echo "❌ CRITICAL ERROR: Could not find 'ImeWlConverterCmd'!"
            exit 1
        fi
        
        echo "✅ Found Binary at: $EXE_PATH"
        chmod +x "$EXE_PATH"
        
        # --- 修复后的新命令格式 ---
        # 使用新格式：-i [输入格式] -o [输出格式] -O [输出文件] [输入文件]
        "$EXE_PATH" -i scel -o rime -O temp_body.yaml sogou.scel

    - name: Add Rime Header
      run: |
        OUT_FILE="output/sogou_pop.dict.yaml"
        CURRENT_DATE=$(date +%Y-%m-%d)
        
        cat <<EOF > $OUT_FILE
        ---
        name: sogou_pop
        version: "$CURRENT_DATE"
        sort: by_weight
        ...

        EOF
        
        if [ -f "temp_body.yaml" ]; then
            cat temp_body.yaml >> $OUT_FILE
            rm sogou.scel temp_body.yaml
            rm -rf tool
            echo "✅ Conversion successful!"
        else
            echo "❌ Error: temp_body.yaml was not generated."
            exit 1
        fi

    - name: Commit and Push
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto update hotwords ($(date +%Y-%m-%d))"
        file_pattern: output/*.yaml
