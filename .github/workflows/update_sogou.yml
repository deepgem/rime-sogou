name: Update Sogou Hotwords

on:
  schedule:
    - cron: '0 22 * * *'  # 北京时间 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install ImewlConverter via dotnet tool
      run: |
        dotnet tool install -g imewlconverter
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Download Sogou Scel
      run: |
        wget -O sogou.scel "https://pinyin.sogou.com/d/dict/download_cell.php?id=4&name=网络流行新词"

    - name: Convert to Rime
      run: |
        mkdir -p output
        imewlconverter -i scel -o rime -O temp_body.yaml sogou.scel

    - name: Add Rime Header
      run: |
        OUT_FILE="output/sogou_pop.dict.yaml"
        CURRENT_DATE=$(date +%Y-%m-%d)

        cat <<EOF > $OUT_FILE
        ---
        name: sogou_pop
        version: "$CURRENT_DATE"
        sort: by_weight
        ...

        EOF

        if [ -f "temp_body.yaml" ]; then
            cat temp_body.yaml >> $OUT_FILE
            rm sogou.scel temp_body.yaml
            echo "✅ Conversion successful!"
        else
            echo "❌ Error: temp_body.yaml was not generated."
            exit 1
        fi

    - name: Commit and Push
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto update hotwords ($CURRENT_DATE)"
        file_pattern: output/*.yaml
