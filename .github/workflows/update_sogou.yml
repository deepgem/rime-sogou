name: Update Sogou Hotwords

on:
  schedule:
    - cron: '0 22 * * *'  # 北京时间 06:00
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write

# 解决 Node.js 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # 显式安装 .NET 8 运行时，确保 dll 能够正常运行
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Download Latest ImewlConverter
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p tool
        echo "🔍 Fetching latest .NET 8.0 release from studyzy/imewlconverter..."
        
        # 下载 net8.0 版本的 zip 包，以避开 linux-x64 二进制文件的兼容性 Bug
        gh release download --repo studyzy/imewlconverter -p "*net8.0.zip" -D tool
        
        echo "📦 Unzipping..."
        unzip tool/*net8.0.zip -d tool
        
        echo "📂 File list:"
        ls -R tool

    - name: Download Sogou Scel
      run: |
        wget -O sogou.scel "https://pinyin.sogou.com/d/dict/download_cell.php?id=4&name=网络流行新词"

    - name: Convert to Rime
      run: |
        mkdir -p output
        echo "🔍 Locating ImeWlConverterCmd.dll..."
        
        # 跨平台版通过 .dll 文件运行
        DLL_PATH=$(find tool -type f -name "ImeWlConverterCmd.dll" | head -n 1)
        
        if [ -z "$DLL_PATH" ]; then
            echo "❌ CRITICAL ERROR: Could not find 'ImeWlConverterCmd.dll'!"
            exit 1
        fi
        
        echo "✅ Found DLL at: $DLL_PATH"
        
        # 使用符合新版本要求的 GNU 风格参数格式
        # 格式：-i [输入格式] -o [输出格式] -O [输出路径] [输入路径]
        dotnet "$DLL_PATH" -i scel -o rime -O temp_body.yaml sogou.scel

    - name: Add Rime Header
      run: |
        OUT_FILE="output/sogou_pop.dict.yaml"
        CURRENT_DATE=$(date +%Y-%m-%d)
        
        cat <<EOF > $OUT_FILE
        ---
        name: sogou_pop
        version: "$CURRENT_DATE"
        sort: by_weight
        ...

        EOF
        
        if [ -f "temp_body.yaml" ]; then
            cat temp_body.yaml >> $OUT_FILE
            rm sogou.scel temp_body.yaml
            rm -rf tool
            echo "✅ Conversion successful!"
        else
            echo "❌ Error: temp_body.yaml was not generated."
            exit 1
        fi

    - name: Commit and Push
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        # 直接使用 shell 表达式获取日期，确保提交信息准确
        commit_message: "chore: auto update hotwords ($(date +%Y-%m-%d))"
        file_pattern: output/*.yaml
